version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: license-postgres
    restart: always
    environment:
      POSTGRES_DB: LicenseRemake
      POSTGRES_USER: licenseRemakeUser
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ./LicenseRemake
      dockerfile: Dockerfile
    container_name: license-api
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=LicenseRemake;Username=licenseRemakeUser;Password=password123;
      Audience__Secret: SUPER_SECRET_KEY_1234567890_1234567890
      Audience__Issuer: LicenseRemake
      Audience__Audience: LicenseRemakeUsers

volumes:
  postgres-data: